<ul>
<li>線形型とは</li>
<li>GHC での線形型</li>
<li>linear-base ライブラリー</li>

<li>線形型＋刹那的データ構造</li>

<h1>もくじ</h1>
<ul>
<li><strong>線形型とは</strong></li>
<li>GHC での線形型</li>
<li>linear-base ライブラリー</li>
<li>刹那的データ構造とは</li>
<li>線形型＋刹那的データ構造</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1920 1080"><foreignObject width="1920" height="1080"><section id="4" data-theme="egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5" style="--theme:egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5;">
<h1>線形型とは</h1>
<ul>
<li>｢値を一度だけ使う｣
<ul>
<li>2回使う → ダメ</li>
<li>1回も使わない → ダメ</li>
</ul>
</li>
<li>コンパイラーがより厳密に型検査できてうれしい</li>
<li>コンパイラーがよりよい最適化ができてうれしい</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1920 1080"><foreignObject width="1920" height="1080"><section id="5" data-theme="egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5" style="--theme:egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5;">
<h1>線形型とは › 2つのスタイル</h1>
<ul>
<li>線形型関数を導入
<ul>
<li>仮引数を1回だけ使う</li>
</ul>
</li>
<li>カインド（種）を拡張
<ul>
<li>1回だけ使える型のカインド</li>
<li>何回でも使える型のカインド</li>
</ul>
</li>
<li>GHC は線形型関数を採用</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1920 1080"><foreignObject width="1920" height="1080"><section id="6" data-theme="egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5" style="--theme:egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5;">
<h1>線形型とは › 線形型関数</h1>
<ul>
<li>普通の関数の型 <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mi>a</mi><mo>→</mo><mi>b</mi></mrow><annotation encoding="application/x-tex">a \rightarrow b</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.43056em;vertical-align:0em;"></span><span class="mord mathnormal">a</span><span class="mspace" style="margin-right:0.2777777777777778em;"></span><span class="mrel">→</span><span class="mspace" style="margin-right:0.2777777777777778em;"></span></span><span class="base"><span class="strut" style="height:0.69444em;vertical-align:0em;"></span><span class="mord mathnormal">b</span></span></span></span></li>
<li>線形型関数の型 <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mi>a</mi><mo>⊸</mo><mi>b</mi></mrow><annotation encoding="application/x-tex">a \multimap b</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.54986em;vertical-align:0em;"></span><span class="mord mathnormal">a</span><span class="mspace" style="margin-right:0.2777777777777778em;"></span><span class="mrel amsrm">⊸</span><span class="mspace" style="margin-right:0.2777777777777778em;"></span></span><span class="base"><span class="strut" style="height:0.69444em;vertical-align:0em;"></span><span class="mord mathnormal">b</span></span></span></span>
<ul>
<li>関数の中で <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mi>a</mi></mrow><annotation encoding="application/x-tex">a</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.43056em;vertical-align:0em;"></span><span class="mord mathnormal">a</span></span></span></span> 型の値は1回しか使えない</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1920 1080"><foreignObject width="1920" height="1080"><section id="7" data-theme="egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5" style="--theme:egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5;">
<h1>もくじ</h1>
<ul>
<li>線形型とは</li>
<li><strong>GHC での線形型</strong></li>
<li>linear-base ライブラリー</li>
<li>刹那的データ構造とは</li>
<li>線形型＋刹那的データ構造</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1920 1080"><foreignObject width="1920" height="1080"><section id="8" data-theme="egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5" style="--theme:egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5;">
<h1>GHC での線形型</h1>
<ul>
<li>linear types 言語拡張（GHC 9.0 以降）</li>
<li><span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mi>a</mi><mo>⊸</mo><mi>b</mi></mrow><annotation encoding="application/x-tex">a \multimap b</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.54986em;vertical-align:0em;"></span><span class="mord mathnormal">a</span><span class="mspace" style="margin-right:0.2777777777777778em;"></span><span class="mrel amsrm">⊸</span><span class="mspace" style="margin-right:0.2777777777777778em;"></span></span><span class="base"><span class="strut" style="height:0.69444em;vertical-align:0em;"></span><span class="mord mathnormal">b</span></span></span></span> を <code>a %1-&gt; b</code> と書く</li>
<li><code>a %1-&gt; b</code> は <code>a %'One-&gt; b</code> の別名
<ul>
<li><code>'One</code> は data kinds 拡張によって持ち上げられた型
<ul>
<li>カインドは <code>Multiplicity</code></li>
</ul>
</li>
</ul>
</li>
<li><code>a %'One-&gt; b</code> は <code>FUN 'One a b</code> の別名</li>
<li>これにともなって <code>a -&gt; b</code> は <code>FUN 'Many a b</code> の別名に</li>
</ul>
<pre><code class="language-haskell"><span class="hljs-class"><span class="hljs-keyword">type</span> <span class="hljs-type">FUN</span> ::</span>
  <span class="hljs-type">Multiplicity</span> -&gt; <span class="hljs-keyword">forall</span> (r1 r2 :: <span class="hljs-type">RuntimeRep</span>). <span class="hljs-type">TYPE</span> r1 -&gt; <span class="hljs-type">TYPE</span> r2

<span class="hljs-class"><span class="hljs-keyword">data</span> <span class="hljs-type">Multiplicity</span> = <span class="hljs-type">One</span> | <span class="hljs-type">Many</span></span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1920 1080"><foreignObject width="1920" height="1080"><section id="9" data-theme="egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5" style="--theme:egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5;">
<h1>GHC での線形型 › 2回使用したとき</h1>
<pre><code class="language-haskell"><span class="hljs-title">f</span> :: <span class="hljs-type">Int</span> %<span class="hljs-number">1</span>-&gt; (<span class="hljs-type">Int</span>, <span class="hljs-type">Int</span>)
<span class="hljs-title">f</span> a = (a, a)
</code></pre>
<pre><code>&lt;interactive&gt;:1:29: error:
    • Couldn't match type ‘'Many’ with ‘'One’
        arising from multiplicity of ‘a’
    • In an equation for ‘f’: f a = (a, a)
</code></pre>
<ul>
<li><code>f</code> の中で <code>a</code> を2回使っているのでエラーになる</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1920 1080"><foreignObject width="1920" height="1080"><section id="10" data-theme="egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5" style="--theme:egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5;">
<h1>GHC での線形型 › 使用しないとき</h1>
<pre><code class="language-haskell"><span class="hljs-title">f</span> :: <span class="hljs-type">Int</span> %<span class="hljs-number">1</span>-&gt; (<span class="hljs-type">Int</span>, <span class="hljs-type">Int</span>)
<span class="hljs-title">f</span> a = (<span class="hljs-number">1</span>, <span class="hljs-number">1</span>)
</code></pre>
<pre><code>&lt;interactive&gt;:2:29: error:
    • Couldn't match type ‘'Many’ with ‘'One’
        arising from multiplicity of ‘a’
    • In an equation for ‘f’: f a = (1, 1)
</code></pre>
<ul>
<li>使用しないときも同じエラーになる</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1920 1080"><foreignObject width="1920" height="1080"><section id="11" data-theme="egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5" style="--theme:egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5;">
<h1>GHC での線形型 › 部分型多相</h1>
<ul>
<li>multiplicity に関しても部分型多相はない</li>
</ul>
<pre><code class="language-haskell"><span class="hljs-title">f</span> :: <span class="hljs-type">Int</span> %<span class="hljs-number">1</span>-&gt; (<span class="hljs-type">Int</span>, <span class="hljs-type">Int</span>)
<span class="hljs-title">f</span> a = (a, <span class="hljs-number">1</span>)

<span class="hljs-title">h</span> :: <span class="hljs-type">Int</span> -&gt; (<span class="hljs-type">Int</span>, <span class="hljs-type">Int</span>)
<span class="hljs-title">h</span> = f
</code></pre>
<pre><code>&lt;interactive&gt;:4:29: error:
    • Couldn't match type ‘'One’ with ‘'Many’
      Expected: Int -&gt; (Int, Int)
        Actual: Int %1 -&gt; (Int, Int)
    • In the expression: f
      In an equation for ‘h’: h = f
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1920 1080"><foreignObject width="1920" height="1080"><section id="12" data-theme="egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5" style="--theme:egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5;">
<h1>GHC での線形型 › イータ変換</h1>
<ul>
<li>これは妥当</li>
</ul>
<pre><code class="language-haskell"><span class="hljs-title">f</span> :: <span class="hljs-type">Int</span> %<span class="hljs-number">1</span>-&gt; (<span class="hljs-type">Int</span>, <span class="hljs-type">Int</span>)
<span class="hljs-title">f</span> a = (a, <span class="hljs-number">1</span>)

<span class="hljs-title">h</span> :: <span class="hljs-type">Int</span> -&gt; (<span class="hljs-type">Int</span>, <span class="hljs-type">Int</span>)
<span class="hljs-title">h</span> a = f a
<span class="hljs-comment">-- h = f -- これはダメ</span>
</code></pre>
<p><img class="emoji" draggable="false" alt="⚠️" src="https://twemoji.maxcdn.com/2/svg/26a0.svg" data-marp-twemoji=""/> 安易にイータ変換してはいけない</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1920 1080"><foreignObject width="1920" height="1080"><section id="13" data-theme="egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5" style="--theme:egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5;">
<h1>GHC での線形型 › パラメーター多相</h1>
<ul>
<li>multiplicity の部分も型変数にできる</li>
</ul>
<pre><code class="language-haskell"><span class="hljs-title">f</span> :: a %m-&gt; (a, <span class="hljs-type">Int</span>)
<span class="hljs-title">f</span> a = (a, <span class="hljs-number">1</span>)

<span class="hljs-title">g</span> :: a -&gt; (a, <span class="hljs-type">Int</span>)
<span class="hljs-title">g</span> = f

<span class="hljs-title">h</span> :: <span class="hljs-type">Int</span> %<span class="hljs-number">1</span>-&gt; (<span class="hljs-type">Int</span>, <span class="hljs-type">Int</span>)
<span class="hljs-title">h</span> = f
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1920 1080"><foreignObject width="1920" height="1080"><section id="14" data-theme="egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5" style="--theme:egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5;">
<h1>GHC での線形型 › パターンマッチ</h1>
<pre><code class="language-haskell"><span class="hljs-title">consume</span> :: <span class="hljs-type">Bool</span> %<span class="hljs-number">1</span>-&gt; ()
<span class="hljs-title">consume</span> <span class="hljs-type">False</span> -&gt; ()
<span class="hljs-title">consume</span> <span class="hljs-type">True</span> -&gt; ()
</code></pre>
<ul>
<li>下記のように変えるとエラーになる</li>
</ul>
<pre><code class="language-haskell"><span class="hljs-title">consume</span> :: <span class="hljs-type">Bool</span> %<span class="hljs-number">1</span>-&gt; ()
<span class="hljs-title">consume</span> _ -&gt; ()
</code></pre>
<p><img class="emoji" draggable="false" alt="⚠️" src="https://twemoji.maxcdn.com/2/svg/26a0.svg" data-marp-twemoji=""/> ワイルドカードには注意</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1920 1080"><foreignObject width="1920" height="1080"><section id="15" data-theme="egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5" style="--theme:egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5;">
<h1>GHC での線形型 › let-in と case-of</h1>
<ul>
<li>let-in 式・case-of 式での束縛は値が複数回使われたことにされる</li>
</ul>
<pre><code class="language-haskell"><span class="hljs-title">idl</span> :: a %<span class="hljs-number">1</span>-&gt; a
<span class="hljs-title">idl</span> a = a

<span class="hljs-title">f</span> :: a %<span class="hljs-number">1</span>-&gt; a
<span class="hljs-title">f</span> a = <span class="hljs-keyword">let</span> b = idl a <span class="hljs-keyword">in</span> b
</code></pre>
<pre><code>&lt;interactive&gt;:3:18: error:
    • Couldn't match type ‘'Many’ with ‘'One’
        arising from multiplicity of ‘a’
    • In an equation for ‘f’: f a = let b = idl a in b
</code></pre>
<ul>
<li>代わりの方法は後述</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1920 1080"><foreignObject width="1920" height="1080"><section id="16" data-theme="egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5" style="--theme:egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5;">
<h1>もくじ</h1>
<ul>
<li>線形型とは</li>
<li>GHC での線形型</li>
<li><strong>linear-base ライブラリー</strong></li>
<li>刹那的データ構造とは</li>
<li>線形型＋刹那的データ構造</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1920 1080"><foreignObject width="1920" height="1080"><section id="17" data-theme="egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5" style="--theme:egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5;">
<h1>linear-base ライブラリー</h1>
<ul>
<li>線形型基本ライブラリー
<ul>
<li>Tweag が提供</li>
<li>Tweag は GHC への線形型拡張を提案・実装した会社</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1920 1080"><foreignObject width="1920" height="1080"><section id="18" data-theme="egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5" style="--theme:egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5;">
<h1>linear-base › ローカル束縛</h1>
<ul>
<li><code>(Prelude.Linear.&amp;)</code> と lambda-case 言語拡張を使う
<ul>
<li><code>(Prelude.Linear.&amp;)</code> は <code>flip ($)</code> の線形版</li>
</ul>
</li>
</ul>
<pre><code class="language-haskell">(&amp;) :: a %<span class="hljs-number">1</span>-&gt; (a %<span class="hljs-number">1</span>-&gt; b) %<span class="hljs-number">1</span>-&gt; b
</code></pre>
<pre><code class="language-haskell"><span class="hljs-meta">{-# LANGUAGE LambdaCase #-}</span>

<span class="hljs-keyword">import</span> <span class="hljs-keyword">qualified</span> Prelude.Linear <span class="hljs-keyword">as</span> PL

<span class="hljs-title">idl</span> :: a %<span class="hljs-number">1</span>-&gt; a
<span class="hljs-title">idl</span> a = a

<span class="hljs-title">f</span> :: a %<span class="hljs-number">1</span>-&gt; a
<span class="hljs-title">f</span> a = idl a <span class="hljs-type">PL</span>.&amp; \<span class="hljs-keyword">case</span> b -&gt; b
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1920 1080"><foreignObject width="1920" height="1080"><section id="19" data-theme="egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5" style="--theme:egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5;">
<h1>linear-base › <code>Ur</code></h1>
<ul>
<li>線形型を扱う上でキモとなるデータ型</li>
</ul>
<pre><code class="language-haskell"><span class="hljs-meta">{-# LANGUAGE GADTs #-}</span>

<span class="hljs-class"><span class="hljs-keyword">data</span> <span class="hljs-type">Ur</span> a where</span>
  <span class="hljs-type">Ur</span> :: a -&gt; <span class="hljs-type">Ur</span> a
</code></pre>
<ul>
<li>線形型がなければこれは下記と同じ</li>
</ul>
<pre><code class="language-haskell"><span class="hljs-class"><span class="hljs-keyword">data</span> <span class="hljs-type">Ur</span> a = <span class="hljs-type">Ur</span> a</span>
</code></pre>
<ul>
<li>これがどうキモなのか？</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1920 1080"><foreignObject width="1920" height="1080"><section id="20" data-theme="egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5" style="--theme:egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5;">
<h1>linear-base › 線形性の伝播</h1>
<p>線形性はデータ型のフィールドに伝播する</p>
<pre><code class="language-haskell"><span class="hljs-class"><span class="hljs-keyword">type</span> <span class="hljs-type">Title</span> = <span class="hljs-type">String</span></span>
<span class="hljs-class"><span class="hljs-keyword">type</span> <span class="hljs-type">Author</span> = <span class="hljs-type">String</span></span>
<span class="hljs-class"><span class="hljs-keyword">data</span> <span class="hljs-type">Book</span> = <span class="hljs-type">Book</span> <span class="hljs-type">Title</span> <span class="hljs-type">Author</span></span>

<span class="hljs-title">f</span> :: <span class="hljs-type">Book</span> %<span class="hljs-number">1</span>-&gt; (<span class="hljs-type">Title</span>, <span class="hljs-type">Author</span>, <span class="hljs-type">String</span>)
<span class="hljs-title">f</span> (<span class="hljs-type">Book</span> t a) = (t, a, <span class="hljs-string">&quot;&quot;</span>)
<span class="hljs-comment">-- f (Book t a) = (t, a, t) -- bad</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1920 1080"><foreignObject width="1920" height="1080"><section id="21" data-theme="egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5" style="--theme:egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5;">
<h1>linear-base › 線形性の伝播を止める</h1>
<ul>
<li>
<p>GADTで <code>-&gt;</code> にすると伝播は止まる</p>
<ul>
<li>generalized algebraic data type</li>
<li>一般化代数的データ型</li>
</ul>
</li>
<li>
<p>先の <code>Book</code> を GADT にする</p>
</li>
</ul>
<pre><code class="language-haskell"><span class="hljs-class"><span class="hljs-keyword">data</span> <span class="hljs-type">Book</span> where</span>
  <span class="hljs-type">Book</span> :: <span class="hljs-type">Title</span> -&gt; <span class="hljs-type">Author</span> -&gt; <span class="hljs-type">Book</span>
</code></pre>
<pre><code class="language-haskell"><span class="hljs-title">f</span> :: <span class="hljs-type">Book</span> %<span class="hljs-number">1</span>-&gt; (<span class="hljs-type">Title</span>, <span class="hljs-type">Author</span>, <span class="hljs-type">String</span>)
<span class="hljs-title">f</span> (<span class="hljs-type">Book</span> t a) = (t, a, t) <span class="hljs-comment">-- OK</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1920 1080"><foreignObject width="1920" height="1080"><section id="22" data-theme="egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5" style="--theme:egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5;">
<h1>linear-base › <code>Ur</code> の使い道 1</h1>
<ul>
<li>線形性の伝播を止めるために使う</li>
</ul>
<pre><code class="language-haskell"><span class="hljs-title">f</span> :: <span class="hljs-type">Ur</span> <span class="hljs-type">Foo</span> %<span class="hljs-number">1</span>-&gt; (<span class="hljs-type">Bar</span>, <span class="hljs-type">Bar</span>)
<span class="hljs-title">f</span> (<span class="hljs-type">Ur</span> foo) = <span class="hljs-keyword">let</span> bar = buzz foo <span class="hljs-keyword">in</span> (bar, bar)
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1920 1080"><foreignObject width="1920" height="1080"><section id="23" data-theme="egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5" style="--theme:egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5;">
<h1>linear-base › 返り値の線形性</h1>
<ul>
<li>このような線形型恒等関数 <code>idl</code> があるとき</li>
</ul>
<pre><code class="language-haskell"><span class="hljs-title">idl</span> :: a %<span class="hljs-number">1</span>-&gt; a
<span class="hljs-title">idl</span> a = a
</code></pre>
<ul>
<li>次のような <code>idl'</code> は妥当かどうか？</li>
</ul>
<pre><code class="language-haskell"><span class="hljs-title">idl&#x27;</span> :: a %<span class="hljs-number">1</span>-&gt; a
<span class="hljs-title">idl&#x27;</span> a = id (idl a)
</code></pre>
<ul>
<li>これはエラーになる</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1920 1080"><foreignObject width="1920" height="1080"><section id="24" data-theme="egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5" style="--theme:egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5;">
<h1>linear-base › 返り値への伝播を止めたい</h1>
<ul>
<li>返り値を何回も使っていいときは？</li>
</ul>
<pre><code class="language-haskell"><span class="hljs-title">notl</span> :: <span class="hljs-type">Bool</span> %<span class="hljs-number">1</span>-&gt; <span class="hljs-type">Bool</span>
<span class="hljs-title">notl</span> <span class="hljs-type">False</span> = <span class="hljs-type">True</span>
<span class="hljs-title">notl</span> <span class="hljs-type">True</span> = <span class="hljs-type">False</span>

<span class="hljs-title">notl&#x27;</span> :: <span class="hljs-type">Bool</span> %<span class="hljs-number">1</span>-&gt; <span class="hljs-type">Bool</span>
<span class="hljs-title">notl&#x27;</span> a = id (notl a) <span class="hljs-comment">-- bad</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1920 1080"><foreignObject width="1920" height="1080"><section id="25" data-theme="egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5" style="--theme:egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5;">
<h1>linear-base › <code>Ur</code> の使い道 2</h1>
<ul>
<li>これも <code>Ur</code> を使う</li>
</ul>
<pre><code class="language-haskell"><span class="hljs-title">notl</span> :: <span class="hljs-type">Bool</span> %<span class="hljs-number">1</span>-&gt; <span class="hljs-type">Ur</span> <span class="hljs-type">Bool</span>
<span class="hljs-title">notl</span> <span class="hljs-type">False</span> = <span class="hljs-type">Ur</span> <span class="hljs-type">True</span>
<span class="hljs-title">notl</span> <span class="hljs-type">True</span> = <span class="hljs-type">Ur</span> <span class="hljs-type">False</span>

<span class="hljs-title">notl&#x27;</span> :: <span class="hljs-type">Bool</span> %<span class="hljs-number">1</span>-&gt; (<span class="hljs-type">Bool</span>, <span class="hljs-type">Bool</span>)
<span class="hljs-title">notl&#x27;</span> a = notl a <span class="hljs-type">LP</span>.&amp; \<span class="hljs-keyword">case</span> <span class="hljs-type">Ur</span> a -&gt; (a, a)
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1920 1080"><foreignObject width="1920" height="1080"><section id="26" data-theme="egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5" style="--theme:egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5;">
<h1>もくじ</h1>
<ul>
<li>線形型とは</li>
<li>GHC での線形型</li>
<li>linear-base ライブラリー</li>
<li><strong>刹那的データ構造とは</strong></li>
<li>線形型＋刹那的データ構造</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1920 1080"><foreignObject width="1920" height="1080"><section id="27" data-theme="egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5" style="--theme:egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5;">
<h1>刹那的データ構造とは</h1>
<ul>
<li>計算量の関係から一度しか値を使うことができない
<ul>
<li>動くけど期待通りの計算量にならない</li>
</ul>
</li>
</ul>
<pre><code class="language-haskell"><span class="hljs-comment">-- bad</span>
<span class="hljs-title">ops</span> =
  <span class="hljs-keyword">let</span>
    q0 = empty
    q1 = enqueue <span class="hljs-number">1</span> q0
    q1&#x27; = enqueue <span class="hljs-number">2</span> q0 <span class="hljs-comment">-- q0 is used twice</span>
    <span class="hljs-type">Just</span> (a, _) = dequeue q1
    <span class="hljs-type">Just</span> (b, _) = dequeue q1&#x27;
  <span class="hljs-keyword">in</span>
    (a, b)
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1920 1080"><foreignObject width="1920" height="1080"><section data-theme="egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5" style="--theme:egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5;--marpit-advanced-background-split:43%;" data-marpit-advanced-background="background" data-marpit-advanced-background-split="right"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;pfds.jpg&quot;);"></figure></div></section></foreignObject><foreignObject width="57%" height="1080"><section id="28" data-theme="egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5" style="--theme:egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5;--marpit-advanced-background-split:43%;" data-marpit-advanced-background="content" data-marpit-advanced-background-split="right">
<h1>刹那的データ構造とは ›<br />キュー</h1>

<ul>
<li>『純粋関数型データ構造』の 5.2 章のキューを題材に</li>
</ul>
</section>
</foreignObject><foreignObject width="1920" height="1080" data-marpit-advanced-background="pseudo"><section style="" data-marpit-advanced-background="pseudo"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1920 1080"><foreignObject width="1920" height="1080"><section id="29" data-theme="egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5" style="--theme:egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5;">
<h1>刹那的データ構造とは › キュー › データ型</h1>
<ul>
<li>FILO（リスト）を2つ用意して FIFO（キュー）を実装する</li>
<li>enqueue のときは右側のリストの先頭に追加する</li>
<li>dequeue のときは左側のリストの先頭から取得する</li>
<li>enqueue・dequeue した後に左側のリストが空なら、右側のリストを反転して左側のリストとし、右側のリストを空にする</li>
<li>償却計算量が enqueue・dequeue ともに <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mi>O</mi><mo stretchy="false">(</mo><mn>1</mn><mo stretchy="false">)</mo></mrow><annotation encoding="application/x-tex">O(1)</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:1em;vertical-align:-0.25em;"></span><span class="mord mathnormal" style="margin-right:0.02778em;">O</span><span class="mopen">(</span><span class="mord">1</span><span class="mclose">)</span></span></span></span>
<ul>
<li>ただし値は高々1回しか使えない</li>
<li>なぜ？書籍を参考のこと</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1920 1080"><foreignObject width="1920" height="1080"><section id="30" data-theme="egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5" style="--theme:egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5;">
<h1>もくじ</h1>
<ul>
<li>線形型とは</li>
<li>GHC での線形型</li>
<li>linear-base ライブラリー</li>
<li>刹那的データ構造とは</li>
<li><strong>線形型＋刹那的データ構造</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1920 1080"><foreignObject width="1920" height="1080"><section id="31" data-theme="egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5" style="--theme:egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5;">
<h1>線形型＋刹那的データ構造 › データ型</h1>
<pre><code class="language-haskell"><span class="hljs-meta">{-# LANGUAGE GADTs #-}</span>
<span class="hljs-meta">{-# LANGUAGE LinearTypes #-}</span>
<span class="hljs-meta">{-# LANGUAGE Strict #-}</span>

<span class="hljs-class"><span class="hljs-keyword">data</span> <span class="hljs-type">Queue</span> a where</span>
  <span class="hljs-type">Queue</span> :: [a] -&gt; [a] -&gt; <span class="hljs-type">Queue</span> a
</code></pre>
<ul>
<li>フィールドのリストは何度使ってもいいので GADT で定義する</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1920 1080"><foreignObject width="1920" height="1080"><section id="32" data-theme="egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5" style="--theme:egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5;">
<h1>線形型＋刹那的データ構造 › empty</h1>
<pre><code class="language-haskell"><span class="hljs-title">empty</span> :: (<span class="hljs-type">Queue</span> a %<span class="hljs-number">1</span>-&gt; b) %<span class="hljs-number">1</span>-&gt; b
<span class="hljs-title">empty</span> k = k (<span class="hljs-type">Queue</span> [] [])
</code></pre>
<ul>
<li>空キューの作成</li>
<li>GHC では線形型は線形型関数なので継続にする</li>
<li>継続の中では <code>Queue [] []</code> を一度しか使えない</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1920 1080"><foreignObject width="1920" height="1080"><section id="33" data-theme="egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5" style="--theme:egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5;">
<h1>線形型＋刹那的データ構造 › null</h1>
<pre><code class="language-haskell"><span class="hljs-title">null</span> :: <span class="hljs-type">Queue</span> a %<span class="hljs-number">1</span>-&gt; (<span class="hljs-type">Ur</span> <span class="hljs-type">Bool</span>, <span class="hljs-type">Queue</span> a)
<span class="hljs-title">null</span> (<span class="hljs-type">Queue</span> l m) = (<span class="hljs-type">Ur</span> (<span class="hljs-type">P</span>.null l), <span class="hljs-type">Queue</span> l m)
</code></pre>
<ul>
<li>空かどうかの検査</li>
<li><code>Queue</code> の定義に GADT を使ったので <code>l</code> を2回使える</li>
<li>結果は <code>Ur</code> に包んで返す
<ul>
<li>線形性を引き継がないように</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1920 1080"><foreignObject width="1920" height="1080"><section id="34" data-theme="egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5" style="--theme:egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5;">
<h1>線形型＋刹那的データ構造 › enqueue</h1>
<pre><code class="language-haskell"><span class="hljs-title">enqueue</span> :: a -&gt; <span class="hljs-type">Queue</span> a %<span class="hljs-number">1</span>-&gt; <span class="hljs-type">Queue</span> a
<span class="hljs-title">enqueue</span> a (<span class="hljs-type">Queue</span> l m) = check l (a:m)

<span class="hljs-title">check</span> :: [a] -&gt; [a] -&gt; <span class="hljs-type">Queue</span> a
<span class="hljs-title">check</span> [] m = <span class="hljs-type">Queue</span> (reverse m) []
<span class="hljs-title">check</span> l m = <span class="hljs-type">Queue</span> l m
</code></pre>
<ul>
<li>左のリストが空になれば右を反転して左にする</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1920 1080"><foreignObject width="1920" height="1080"><section id="35" data-theme="egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5" style="--theme:egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5;">
<h1>線形型＋刹那的データ構造 › dequeue</h1>
<pre><code class="language-haskell"><span class="hljs-title">dequeue</span> :: <span class="hljs-type">Queue</span> a %<span class="hljs-number">1</span>-&gt; (<span class="hljs-type">Ur</span> (<span class="hljs-type">Maybe</span> a), <span class="hljs-type">Queue</span> a)
<span class="hljs-title">dequeue</span> (<span class="hljs-type">Queue</span> (a:l) m) = (<span class="hljs-type">Ur</span> (<span class="hljs-type">Just</span> a), check l m)
<span class="hljs-title">dequeue</span> (<span class="hljs-type">Queue</span> l m) = (<span class="hljs-type">Ur</span> <span class="hljs-type">Nothing</span>, <span class="hljs-type">Queue</span> l m)

<span class="hljs-title">check</span> :: [a] -&gt; [a] -&gt; <span class="hljs-type">Queue</span> a
<span class="hljs-title">check</span> [] m = <span class="hljs-type">Queue</span> (reverse m) []
<span class="hljs-title">check</span> l m = <span class="hljs-type">Queue</span> l m
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1920 1080"><foreignObject width="1920" height="1080"><section id="36" data-theme="egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5" style="--theme:egg7rwjn2ap5nyo478fkf98fmu4f2wl3v2myuf2a3gn5;">
<h1>線形型＋刹那的データ構造 › 使ってみる</h1>
<ul>
<li>0 を enqueue して dequeue するだけの例</li>
</ul>
<pre><code class="language-haskell"><span class="hljs-title">it</span> <span class="hljs-string">&quot;empty → enqueue → dequeue&quot;</span> $ <span class="hljs-keyword">do</span>
  <span class="hljs-keyword">let</span>
    f :: <span class="hljs-type">Queue</span> <span class="hljs-type">Int</span> %<span class="hljs-number">1</span>-&gt; <span class="hljs-type">Ur</span> <span class="hljs-type">Int</span>
    f q =
      enqueue <span class="hljs-number">0</span> q <span class="hljs-type">PL</span>.&amp; \q -&gt;
      dequeue q <span class="hljs-type">PL</span>.&amp; \(<span class="hljs-type">Ur</span> (<span class="hljs-type">Just</span> a), q) -&gt;
      q `lseq` <span class="hljs-type">Ur</span> a
    <span class="hljs-type">Ur</span> a = empty f
  a `shouldBe` <span class="hljs-number">0</span>
</code></pre>
</section>
